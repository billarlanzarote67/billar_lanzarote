<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Billar Lanzarote Demo Overlay</title>
<style>
body { margin:0; background:transparent; font-family:Arial,sans-serif; color:#fff; }
.wrap { width:100%; box-sizing:border-box; padding:18px 24px; display:flex; justify-content:space-between; align-items:center; background:linear-gradient(90deg, rgba(11,11,11,.92), rgba(255,60,0,.58)); border-bottom:2px solid rgba(255,122,0,.9); }
.title { font-size:26px; font-weight:800; }
.sub { font-size:14px; color:#ffb08f; margin-top:4px; }
.right { display:flex; gap:18px; align-items:center; }
.scorebox { min-width:84px; text-align:center; background:#0b0b0b; border:1px solid #ff7a00; border-radius:12px; padding:10px 12px; }
.score { font-size:34px; font-weight:800; line-height:1; }
.label { font-size:12px; color:#ffb08f; margin-top:6px; }
.vs { font-size:18px; color:#ff7a00; font-weight:700; }
.warn { font-size:13px; color:#ffd59a; margin-left:20px; }
</style>
</head>
<body>
<div class="wrap">
  <div>
    <div class="title" id="title">Billar Lanzarote Demo</div>
    <div class="sub" id="sub">Mesa 1 • Waiting</div>
  </div>
  <div class="right">
    <div class="scorebox"><div class="score" id="sa">0</div><div class="label">A</div></div>
    <div class="vs">VS</div>
    <div class="scorebox"><div class="score" id="sb">0</div><div class="label">B</div></div>
    <div class="warn" id="warn">No warning</div>
  </div>
</div>
<script>
function qp(name){ const u = new URL(window.location.href); return u.searchParams.get(name) || "mesa1"; }
async function tick(){
  const table = qp("table");
  const res = await fetch(`/api/overlay?table=${encodeURIComponent(table)}`);
  const d = await res.json();
  document.getElementById("title").textContent = `${d.player_a || "Waiting"} vs ${d.player_b || "Waiting"}`;
  document.getElementById("sub").textContent = `${d.table_name || table}${d.discipline ? " • " + d.discipline : ""}${d.mode ? " • " + d.mode.toUpperCase() : ""}`;
  document.getElementById("sa").textContent = d.score_a ?? 0;
  document.getElementById("sb").textContent = d.score_b ?? 0;
  document.getElementById("warn").textContent = d.warning || "No warning";
}
tick(); setInterval(tick, 2000);
</script>
</body>
</html>
