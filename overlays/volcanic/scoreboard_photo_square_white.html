<!doctype html><html><head><meta charset='utf-8'><style>
body{margin:0;background:transparent;font-family:Arial,sans-serif;color:#fff}
.wrap{width:900px;background:linear-gradient(90deg,#0d0d0d,#6c1200);border:2px solid #fff;border-radius:18px;padding:12px 18px;display:grid;grid-template-columns:62px 1fr auto 1fr 62px;gap:12px;align-items:center}
.pic{width:54px;height:54px;border:2px solid #fff;background:#2a2a2a}.name{font-size:22px;font-weight:800}.score{font-size:40px;font-weight:900}.right{text-align:right}.small{font-size:13px;color:#ffe0db}
</style></head><body><div class='wrap'><div class='pic'></div><div><div id='ta' class='name'>Jugador A</div><div id='race' class='small'>Carrera a 7</div></div><div id='sc' class='score'>0-0</div><div class='right'><div id='tb' class='name'>Jugador B</div><div id='mesa' class='small'>Mesa 1</div></div><div class='pic'></div></div>
<script>
const params = new URLSearchParams(location.search);
const table = params.get('table') || 'mesa1';
const photo = params.get('photo') || 'off';
async function tick(){
  const r = await fetch(`file:///C:/AI/BillarLanzarote/state/live_tables.json`).catch(()=>null);
}
async function loadData(){
  try{
    const txt = await (await fetch('file:///C:/AI/BillarLanzarote/state/live_tables.json')).text();
    const data = JSON.parse(txt);
    const t = (data.tables || {})[table] || {};
    if (document.getElementById('ta')) document.getElementById('ta').textContent = t.player_a || 'Jugador A';
    if (document.getElementById('tb')) document.getElementById('tb').textContent = t.player_b || 'Jugador B';
    if (document.getElementById('sc')) document.getElementById('sc').textContent = t.score || '0-0';
    if (document.getElementById('race')) document.getElementById('race').textContent = t.race_text_es || 'Carrera desconocida';
    if (document.getElementById('mesa')) document.getElementById('mesa').textContent = t.table_name || table;
  }catch(e){}
}
loadData(); setInterval(loadData, 2000);
</script>
</body></html>
