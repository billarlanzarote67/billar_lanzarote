<!doctype html><html><head><meta charset='utf-8'><style>
body{margin:0;background:transparent;font-family:Arial,sans-serif;color:#fff}
.page{padding:18px;background:linear-gradient(135deg,rgba(11,11,11,.96),rgba(80,20,0,.78));border:2px solid #ff7a00;border-radius:18px;width:900px}
.top{display:flex;justify-content:space-between;align-items:center}.title{font-size:26px;font-weight:800}.sub{font-size:14px;color:#ffb08f;margin-top:6px}
.row{display:grid;grid-template-columns:1fr auto 1fr;gap:14px;margin-top:20px;align-items:center}.card{background:#141414;border:1px solid #ff7a00;border-radius:16px;padding:18px}
.name{font-size:28px;font-weight:700}.score{font-size:54px;font-weight:900;text-align:center}.vs{font-size:24px;color:#ff7a00;font-weight:800}
.small{font-size:14px;color:#ffb08f}
</style></head><body><div class='page'><div class='top'><div><div class='title'>Billar Lanzarote</div><div id='sub' class='sub'>Partida en curso</div></div><div id='table' class='small'>Mesa 1</div></div><div class='row'><div class='card'><div id='a' class='name'>Jugador A</div></div><div class='score' id='score'>0 - 0</div><div class='card'><div id='b' class='name'>Jugador B</div></div></div></div>
<script>
const params = new URLSearchParams(location.search); const table = params.get('table') || 'mesa1';
async function tick(){ const r = await fetch(`http://127.0.0.1:8789/api/overlay?table=${table}`); const d = await r.json();
document.getElementById('a').textContent = d.player_a || 'Jugador A';
document.getElementById('b').textContent = d.player_b || 'Jugador B';
document.getElementById('score').textContent = `${d.score_a ?? 0} - ${d.score_b ?? 0}`;
document.getElementById('sub').textContent = d.discipline || 'Partida en curso';
document.getElementById('table').textContent = d.table_name || table; }
tick(); setInterval(tick, 2000);
</script></body></html>
