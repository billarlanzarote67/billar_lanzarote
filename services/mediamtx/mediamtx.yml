###############################################
# Global settings

logLevel: info
logDestinations: [stdout]
logStructured: false
logFile: mediamtx.log

readTimeout: 10s
writeTimeout: 10s
writeQueueSize: 512
udpMaxPayloadSize: 1452

###############################################
# Protocol servers (RTSP, RTMP, HLS, WebRTC, SRT)

# Enable RTSP server
rtsp: true
rtspTransports: [udp, multicast, tcp]
rtspEncryption: "no"
rtspAddress: :8554
rtspsAddress: :8322
rtpAddress: :8000
rtcpAddress: :8001

# Enable SRT
srt: true
srtAddress: :8890

# Enable RTMP
rtmp: true
rtmpEncryption: "no"
rtmpAddress: :1935
rtmpsAddress: :1936

# Enable HLS
hls: true
hlsAddress: :8888
hlsEncryption: false
hlsAllowOrigins: ['*']

# Enable WebRTC
webrtc: true
webrtcAddress: :8889
webrtcEncryption: false
webrtcAllowOrigins: ['*']

###############################################
# Paths (stream sources / cameras)

paths:
  mesa1:
    source: rtsp://BillarLanzarote:BillarLanzarote6767@192.168.1.34:554/stream1
    rtspTransport: tcp
    sourceOnDemand: false
    overridePublisher: true

  mesa2:
    source: rtsp://BillarLanzarote:BillarLanzarote6767@192.168.1.44:554/stream1
    rtspTransport: tcp
    sourceOnDemand: false
    overridePublisher: true