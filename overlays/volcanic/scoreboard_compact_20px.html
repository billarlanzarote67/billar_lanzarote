<!doctype html><html><head><meta charset='utf-8'><style>
body{margin:0;background:transparent;color:#fff;font-family:Arial,sans-serif;overflow:hidden}
.bar{height:20px;line-height:20px;background:linear-gradient(90deg,#111,#8c1000);border-top:1px solid #ff2a00;display:grid;grid-template-columns:1fr auto 1fr;font-size:11px;font-weight:700}
.l{padding-left:8px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.c{text-align:center;min-width:42px;background:#0e0e0e}.r{padding-right:8px;text-align:right;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
</style></head><body><div class='bar'><div id='ta' class='l'>Jugador A</div><div id='sc' class='c'>0-0</div><div id='tb' class='r'>Jugador B</div></div>
<script>
const params = new URLSearchParams(location.search);
const table = params.get('table') || 'mesa1';
const photo = params.get('photo') || 'off';
async function tick(){
  const r = await fetch(`file:///C:/AI/BillarLanzarote/state/live_tables.json`).catch(()=>null);
}
async function loadData(){
  try{
    const txt = await (await fetch('file:///C:/AI/BillarLanzarote/state/live_tables.json')).text();
    const data = JSON.parse(txt);
    const t = (data.tables || {})[table] || {};
    if (document.getElementById('ta')) document.getElementById('ta').textContent = t.player_a || 'Jugador A';
    if (document.getElementById('tb')) document.getElementById('tb').textContent = t.player_b || 'Jugador B';
    if (document.getElementById('sc')) document.getElementById('sc').textContent = t.score || '0-0';
    if (document.getElementById('race')) document.getElementById('race').textContent = t.race_text_es || 'Carrera desconocida';
    if (document.getElementById('mesa')) document.getElementById('mesa').textContent = t.table_name || table;
  }catch(e){}
}
loadData(); setInterval(loadData, 2000);
</script>
</body></html>
